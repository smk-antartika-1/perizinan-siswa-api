services:
  api:
    build:
      context: .
    image: perizinan-siswa-api:latest
    container_name: perizinan-siswa-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8000
      UPLOAD_DIR: /app/uploads
    expose:
      - "8000"
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2-alpine
    container_name: perizinan-siswa-api-caddy
    restart: unless-stopped
    depends_on:
      - api
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN in .env to your public domain}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
