services:
  db:
    image: postgres:16-alpine
    container_name: perizinan-siswa-api-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-perizinan_siswa}
      POSTGRES_USER: ${POSTGRES_USER:-sipas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-sipas} -d $${POSTGRES_DB:-perizinan_siswa}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    image: perizinan-siswa-api:latest
    container_name: perizinan-siswa-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8000
      UPLOAD_DIR: /app/uploads
      DATABASE_URL: postgresql://${POSTGRES_USER:-sipas}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@${POSTGRES_HOST:-db}:5432/${POSTGRES_DB:-perizinan_siswa}
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2-alpine
    container_name: perizinan-siswa-api-caddy
    restart: unless-stopped
    depends_on:
      - api
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN in .env to your public domain}
      ACME_PROFILE: ${ACME_PROFILE:-shortlived}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
